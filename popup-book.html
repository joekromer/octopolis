<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pop-Up Book — Big Art</title>
<meta name="description" content="A new Big Art project in the making. A pop-up book featuring local artists. Something unique is cooking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --purple: #7c3aed;
  --magenta: #c026d3;
  --peach: #f9a8d4;
  --text-primary: #f1e8ff;
  --text-secondary: rgba(241,232,255,0.6);
  --text-muted: rgba(241,232,255,0.35);
  --bg: #0d0520;
  --border-subtle: rgba(124,58,237,0.18);
  --font-body: 'Inter', sans-serif;
}

html { -webkit-font-smoothing:antialiased; }
body {
  font-family: var(--font-body);
  color: var(--text-primary);
  background: var(--bg);
  overflow-x: hidden;
  min-height:100vh;
}

.grain {
  position:fixed; inset:0; z-index:9990;
  pointer-events:none; opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px;
}

.bubble-canvas { position:fixed; inset:0; z-index:9998; pointer-events:none; }
.cursor-glow {
  position:fixed; width:20px; height:20px;
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(192,38,211,0.5) 0%, rgba(124,58,237,0.15) 50%, transparent 70%);
  filter:blur(2px);
}
@media(max-width:768px) { .bubble-canvas, .cursor-glow { display:none; } }

/* NAV */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:24px 48px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-mark {
  font-size:0.75rem; font-weight:600;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-primary); text-decoration:none;
}
.nav-links { display:flex; gap:28px; }
.nav-links a {
  color:var(--text-primary); text-decoration:none;
  font-size:0.75rem; font-weight:400;
  letter-spacing:0.08em; text-transform:uppercase;
  opacity:0.7; transition:opacity 0.3s;
}
.nav-links a:hover { opacity:1; }

/* MAIN */
.wrap {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:140px 32px 80px;
}
.stage {
  max-width:980px; width:100%;
  display:grid; grid-template-columns: 1fr 1fr;
  gap:72px; align-items:center;
}

.book {
  width:100%; max-width:420px;
  aspect-ratio:1/1;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto;
  box-shadow:
    0 24px 70px -20px rgba(0,0,0,0.6),
    0 0 60px -10px rgba(124,58,237,0.35),
    0 0 90px -10px rgba(192,38,211,0.18);
  animation: floaty 7s ease-in-out infinite;
}
.book img { width:100%; height:100%; display:block; object-fit:cover; }
@keyframes floaty {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}

.copy { display:flex; flex-direction:column; gap:22px; }
.title {
  font-weight:600;
  font-size:clamp(2rem, 4vw, 3rem);
  line-height:1.1;
  letter-spacing:-0.02em;
}
.lede {
  font-size:1rem;
  font-weight:300;
  line-height:1.7;
  color:var(--text-secondary);
  max-width:460px;
}

.form { display:flex; gap:10px; max-width:460px; flex-wrap:wrap; margin-top:4px; }
.form input[type="email"] {
  flex:1 1 220px;
  background:transparent;
  border:1px solid var(--border-subtle);
  color:var(--text-primary);
  padding:13px 16px;
  border-radius:8px;
  font-family:inherit; font-size:1rem; font-weight:300;
  transition:border-color 0.3s;
}
.form input[type="email"]::placeholder { color:rgba(241,232,255,0.35); }
.form input[type="email"]:focus { outline:none; border-color:var(--peach); }
.form button {
  background:transparent;
  color:var(--text-primary);
  border:1px solid var(--text-primary);
  padding:13px 24px;
  border-radius:8px;
  font-family:inherit; font-size:0.9rem; font-weight:400;
  letter-spacing:0.04em;
  cursor:pointer;
  transition:background 0.25s, color 0.25s;
}
.form button:hover { background:var(--text-primary); color:var(--bg); }
.form button:disabled { opacity:0.5; cursor:wait; }
.status {
  font-size:0.85rem; color:var(--text-muted);
  min-height:1.2em; margin-top:4px; flex-basis:100%;
}

.footer {
  padding:24px 48px 32px;
  text-align:center; font-size:0.7rem; color:var(--text-muted);
}
.footer a { color:var(--text-secondary); text-decoration:none; }
.footer a:hover { color:var(--peach); }

.mobile-menu {
  display:none; background:none; border:none;
  color:#f1e8ff; font-size:1.6rem; cursor:pointer;
  padding:4px 8px; line-height:1;
}
@media (max-width: 860px) {
  .stage { grid-template-columns:1fr; gap:48px; text-align:center; }
  .copy { align-items:center; }
  .lede { margin:0 auto; }
  .form { margin-left:auto; margin-right:auto; justify-content:center; }
  .book { max-width:300px; }
}
@media (max-width: 768px) {
  .nav { padding:14px 18px; }
  .mobile-menu { display:block; }
  .nav-links {
    display:none;
    position:absolute; top:100%; left:0; right:0;
    background:rgba(13,5,32,0.96);
    backdrop-filter:blur(14px);
    flex-direction:column; padding:24px; gap:18px;
    border-top:1px solid rgba(241,232,255,0.08);
  }
  .nav-links.open { display:flex; }
  .wrap { padding:120px 20px 60px; }
  input, textarea, button, select { font-size:16px !important; }
}
</style>
</head>
<body>
<div class="grain"></div>
<canvas class="bubble-canvas" id="bubbleCanvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<nav class="nav">
  <a href="index.html" class="nav-mark">Big Art</a>
  <button class="mobile-menu" id="mobileMenuBtn" aria-label="Menu">&#9776;</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html#projects">Projects</a>
    <a href="team.html">Team</a>
    <a href="knowledge.html">Knowledge</a>
    <a href="https://ravensheartdesigns.com/" target="_blank">Shop</a>
    <a href="index.html#connect">Connect</a>
  </div>
</nav>

<main class="wrap">
  <div class="stage">
    <div class="book">
      <img src="popup-book-cover.jpg" alt="An illustrated book titled Big Art, with a brass key on the cover.">
    </div>

    <div class="copy">
      <h1 class="title">Something unique is cooking…</h1>
      <p class="lede">A pop-up book brought to life by a constellation of local artists, each shaping a page of their own. Still in the workshop &mdash; leave your email and we&rsquo;ll send word when it opens.</p>

      <form id="popup-form" class="form" novalidate>
        <input type="email" name="EMAIL" placeholder="you@example.com" required autocomplete="email">
        <button type="submit">Keep me posted</button>
        <p id="popup-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</main>

<footer class="footer">
  &copy; Big Art &middot; <a href="index.html">Back to Big Art</a>
</footer>

<script>
// Mobile nav
(function(){
  var btn = document.getElementById('mobileMenuBtn');
  var links = document.getElementById('navLinks');
  if (btn && links) btn.addEventListener('click', function(){ links.classList.toggle('open'); });
})();

// Bubble cursor — diversified
(function(){
  var canvas = document.getElementById('bubbleCanvas');
  var glow = document.getElementById('cursorGlow');
  if (!canvas || !glow || window.innerWidth <= 768) return;
  var ctx = canvas.getContext('2d');
  var bubbles = [];
  var palette = [280, 312, 195, 340, 260]; // purple, magenta, teal, peach, lavender
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', function(e){
    glow.style.left = e.clientX+'px'; glow.style.top = e.clientY+'px';
    if (Math.random() > 0.35) {
      var roll = Math.random();
      var r = roll < 0.55 ? Math.random()*4 + 2
            : roll < 0.9  ? Math.random()*7 + 6
                          : Math.random()*8 + 13;
      bubbles.push({
        x: e.clientX + (Math.random()-0.5)*24, y: e.clientY,
        r: r,
        vx: (Math.random()-0.5)*0.9,
        vy: -(Math.random()*1.8 + 0.3),
        wobAmp: Math.random()*1.2 + 0.3,
        wobFreq: Math.random()*0.04 + 0.02,
        phase: Math.random()*Math.PI*2,
        alpha: 0.55 + Math.random()*0.3,
        hue: palette[Math.floor(Math.random()*palette.length)],
        blur: Math.random()<0.45 ? Math.random()*3.5 + 1 : 0,
        soft: Math.random() < 0.22,
        decay: 0.0035 + Math.random()*0.004
      });
    }
  });
  (function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (var i=bubbles.length-1; i>=0; i--){
      var b = bubbles[i];
      b.phase += b.wobFreq;
      b.x += b.vx + Math.sin(b.phase)*b.wobAmp*0.18;
      b.y += b.vy;
      b.alpha -= b.decay; b.r *= 0.998;
      if (b.alpha <= 0){ bubbles.splice(i,1); continue; }
      ctx.filter = b.blur ? 'blur('+b.blur+'px)' : 'none';
      if (b.soft) {
        var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r*1.6);
        g.addColorStop(0, 'hsla('+b.hue+',90%,85%,'+(b.alpha*0.55)+')');
        g.addColorStop(1, 'hsla('+b.hue+',90%,85%,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.6,0,Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle = 'hsla('+b.hue+',70%,78%,'+(b.alpha*0.18)+')'; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.strokeStyle = 'hsla('+b.hue+',90%,88%,'+(b.alpha*0.7)+')'; ctx.lineWidth = 1.4; ctx.stroke();
        ctx.beginPath(); ctx.arc(b.x-b.r*0.35, b.y-b.r*0.35, b.r*0.22, 0, Math.PI*2);
        ctx.fillStyle = 'hsla('+b.hue+',95%,96%,'+(b.alpha*0.85)+')'; ctx.fill();
      }
    }
    ctx.filter = 'none';
    if (bubbles.length > 140) bubbles.splice(0, bubbles.length-140);
    requestAnimationFrame(tick);
  })();
})();

// Email signup — posts to Mailchimp; tagged FNAME = "PopUpBook" so Lena can filter & export to Google Sheet.
(function(){
  var form = document.getElementById('popup-form');
  if (!form) return;
  var statusEl = document.getElementById('popup-status');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var emailInput = form.querySelector('input[name="EMAIL"]');
    var email = (emailInput.value || '').trim();
    var btn = form.querySelector('button');
    if (!email || email.indexOf('@') === -1) {
      statusEl.textContent = 'Please enter a valid email.';
      return;
    }
    btn.disabled = true;
    statusEl.textContent = 'Sending…';
    var cb = 'mcjp_' + Date.now();
    window[cb] = function(resp){
      try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      var ok = resp && resp.result === 'success';
      var alreadyIn = resp && resp.msg && /already/i.test(resp.msg);
      if (ok || alreadyIn) {
        statusEl.style.color = '#f9a8d4';
        statusEl.textContent = 'You’re on the list. We’ll send word when a page turns.';
        form.reset();
      } else {
        statusEl.textContent = (resp && resp.msg) ? String(resp.msg).replace(/<[^>]+>/g,'') : 'Something went wrong. Try again?';
      }
      btn.disabled = false;
    };
    var url = 'https://gmail.us1.list-manage.com/subscribe/post-json'
            + '?u=5a6738ccb3433733057f8164d'
            + '&id=1ca9a93ed1'
            + '&EMAIL=' + encodeURIComponent(email)
            + '&FNAME=' + encodeURIComponent('PopUpBook')
            + '&c=' + cb;
    var s = document.createElement('script');
    s.src = url;
    s.onerror = function(){
      statusEl.textContent = 'Network hiccup. Try again in a moment.';
      btn.disabled = false;
    };
    document.body.appendChild(s);
  });
})();
</script>
</body>
</html>
